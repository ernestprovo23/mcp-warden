name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # --------------------------------------------------------------------------
  # Job 1: pytest suite
  # --------------------------------------------------------------------------
  test:
    name: Test suite (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      # All actions pinned to a major version that ships the Node 24 runtime
      # (checkout v6 / setup-python v6 / upload-artifact v7) to clear the
      # Node 20 deprecation warning. Bump majors deliberately, never float @main.
      # Full 40-char commit SHAs used to prevent tag-mutable supply-chain attacks.
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package + dev deps
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: pytest -q

      # Re-run the property-fuzz suite deterministically with a FIXED hypothesis
      # seed so any counterexample is replayable from the workflow log alone
      # (issue #17, binding fix #5). The pinned --hypothesis-seed=0 is what makes
      # this run deterministic; the ci profile (max_examples=1000, no example DB)
      # is loaded by tests/fuzz/conftest.py. (No derandomize on top of the fixed
      # seed — see the B5 note in conftest.py: it would be moot here and diverge
      # from the unseeded local pytest run.)
      - name: Run property-fuzz suite (deterministic, seed=0)
        run: pytest tests/fuzz -p no:randomly --hypothesis-seed=0

  # --------------------------------------------------------------------------
  # Job 2: MCP integrity gate demo
  #
  # Lock strategy: COMMITTED LOCK
  #   tests/fixtures/clean.warden.lock was pinned once (locally, with --approve)
  #   and committed alongside the fixture.  CI never re-pins; it only checks.
  #   This mirrors real usage: pin once → commit the lock → CI verifies on
  #   every subsequent push.
  #
  # Two steps, both leave the job GREEN:
  #   Pass path    — check clean_server.py vs committed lock  → exit 0 (good).
  #   Blocking proof — check mutated_server.py vs same lock  → exit 1, which
  #                    the shell inverts to prove the gate blocks the rug-pull.
  # --------------------------------------------------------------------------
  integrity-gate:
    name: MCP integrity gate
    runs-on: ubuntu-latest
    # Run even if the test job fails so drift findings are always visible.
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install mcp-warden
        run: pip install -e ".[dev]"

      # -----------------------------------------------------------------------
      # Pass path: clean server vs committed lock — gate should be silent (OK).
      # -----------------------------------------------------------------------
      - name: "Pass path: check clean server against committed lock"
        run: |
          mcp-warden check python tests/fixtures/clean_server.py \
            --lock tests/fixtures/clean.warden.lock \
            --sarif clean-check.sarif
          echo "clean-check exit: $?"

      # -----------------------------------------------------------------------
      # Blocking proof: mutated server vs same committed lock.
      # The gate MUST exit non-zero here.  If it exits 0, the gate is broken
      # and we fail CI explicitly.
      # -----------------------------------------------------------------------
      - name: "Blocking proof: mutated server must be rejected by the gate"
        run: |
          echo "--- Drift output (expect DRIFT DETECTED) ---"
          if mcp-warden check python tests/fixtures/mutated_server.py \
               --lock tests/fixtures/clean.warden.lock \
               --sarif mutated-check.sarif ; then
            echo "ERROR: integrity gate failed to block drift — this is a bug"
            exit 1
          fi
          echo "--- Gate correctly blocked the rug-pull (non-zero exit confirmed) ---"

      # -----------------------------------------------------------------------
      # Upload SARIF from the mutated check so the drift finding is visible
      # in the Actions run as a build artifact.
      # -----------------------------------------------------------------------
      - name: Upload drift SARIF artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mcp-warden-drift-sarif
          path: mutated-check.sarif
          if-no-files-found: warn

  # --------------------------------------------------------------------------
  # Job 3: LIVE Sigstore keyless sign + verify end-to-end (#16)
  #
  # This is the REAL crypto evidence and the API-correctness backstop for
  # signing.py: it actually mints a Fulcio cert from the workflow's ambient
  # OIDC, signs a test server's overall_digest, then verifies the bundle
  # against THIS workflow's own identity. A wrong sigstore API call (caught in
  # a fail-closed except) would surface here as a non-zero verify and break CI.
  #
  # Forks lack `id-token: write`, so the ambient-OIDC signing step cannot run
  # there. We SKIP on forks (not fail) via the `if:` guard below.
  # --------------------------------------------------------------------------
  sigstore-e2e:
    name: Sigstore sign+verify (live)
    runs-on: ubuntu-latest
    # Forks cannot get an id-token; skip cleanly rather than fail.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.fork == false
    permissions:
      id-token: write   # REQUIRED for ambient OIDC -> Fulcio
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install mcp-warden with the sigstore extra
        run: pip install -e ".[dev,sigstore]"

      # Sign the clean fixture's overall_digest with the workflow's ambient OIDC.
      - name: "pin --sign (ambient OIDC)"
        run: |
          mcp-warden pin python tests/fixtures/clean_server.py \
            --lock e2e.warden.lock --sign
          test -f e2e.warden.lock.sigstore  # sidecar must exist on success

      # Verify against THIS workflow's own identity. The identity is the canonical
      # GitHub Actions SAN for the running workflow file at the running ref.
      # The ref is derived from $GITHUB_REF (never hardcoded) so this is correct on
      # any branch/tag. policy.Identity does EXACT-string equality on both the SAN
      # identity and the issuer (sigstore 4.3.0 verify/policy.py), so this full
      # identity string — including the ref — must match the minted cert exactly.
      - name: "check --verify (own identity)"
        run: |
          mcp-warden check \
            --lock e2e.warden.lock \
            --verify \
            --certificate-identity \
              "https://github.com/ernestprovo23/mcp-warden/.github/workflows/integrity-gate.yml@${GITHUB_REF}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"

      # NEGATIVE PROOF (real crypto): tamper the signed lock's overall_digest and
      # confirm REAL sigstore rejects it. We mutate overall_digest in-place, then
      # re-verify against the SAME real bundle + identity. verify_artifact re-derives
      # sha256 of the recomputed statement and compares it to the bundle's signed
      # message_digest, so the tampered surface MUST fail. If verify SUCCEEDS on the
      # tampered lock, the gate is broken and we fail the job explicitly.
      - name: "Negative proof: tampered overall_digest must be rejected by real sigstore"
        run: |
          python -c "import json,sys; p='e2e.warden.lock'; d=json.load(open(p)); d['overall_digest']='sha256:'+'0'*64; json.dump(d, open(p,'w'), indent=2)"
          echo "--- Re-verifying tampered lock against the SAME real bundle (expect FAILURE) ---"
          if mcp-warden check \
               --lock e2e.warden.lock \
               --verify \
               --certificate-identity \
                 "https://github.com/ernestprovo23/mcp-warden/.github/workflows/integrity-gate.yml@${GITHUB_REF}" \
               --certificate-oidc-issuer "https://token.actions.githubusercontent.com" ; then
            echo "ERROR: real sigstore verified a TAMPERED overall_digest — fail closed is broken"
            exit 1
          fi
          echo "--- Tampered surface correctly rejected by real sigstore (non-zero verify confirmed) ---"

      - name: Upload signed lock + bundle
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mcp-warden-sigstore-e2e
          path: |
            e2e.warden.lock
            e2e.warden.lock.sigstore
          if-no-files-found: warn

  # --------------------------------------------------------------------------
  # Job 4: secret scan (gitleaks, full git history)
  #
  # mcp-warden is itself a security tool, so it scans its own history on every
  # push/PR. Synthetic detector test vectors under tests/ are allowlisted in
  # .gitleaks.toml; all of src/ is fully scanned. A real leak fails CI.
  # --------------------------------------------------------------------------
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSLf \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan full git history
        run: gitleaks git . --config .gitleaks.toml --redact --no-banner
